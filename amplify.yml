version: 1
frontend:
  phases:
    preBuild:
      commands:
        - "npm install"
    build:
      commands:
        - "npx amplify generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID"
        - "npm run build"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - ".npm/**/*"
